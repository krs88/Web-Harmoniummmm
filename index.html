<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Harmonium Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>🎹 Web Harmonium</h1>

  <div id="keys" class="keys"></div>

  <div class="controls">
    <button id="play">▶ Play</button>
    <button id="pause">⏸ Pause</button>
    <button id="stop">⏹ Stop</button>
  </div>

  <label for="speed">Speed</label>
  <input type="range" id="speed" min="0.5" max="2" step="0.1" value="1">

  <label for="songSelect">Preset Song</label>
  <select id="songSelect"></select>

  <label for="noteInput">Manual Notes</label>
  <textarea id="noteInput" placeholder="Example: E E 4 5 - U U 8 8"></textarea>
  <button id="convert">Convert & Play Manual Notes</button>

  <label for="songTextInput">AI Song-to-Notes Tool</label>
  <textarea id="songTextInput" placeholder="Paste lyrics or note words (Do Re Mi / C D E / sa re ga) and click AI convert..."></textarea>
  <button id="aiConvert">🤖 AI Convert Song Text to Notes</button>

  <label for="soundFiles">Sound Connection (optional custom samples)</label>
  <input id="soundFiles" type="file" accept="audio/*" multiple>
  <button id="connectSounds">🔌 Connect Sound Files</button>
  <p id="soundStatus" class="status">Using built-in/fallback sounds.</p>

  <script type="module" src="app.js"></script>
</body>
</html>
